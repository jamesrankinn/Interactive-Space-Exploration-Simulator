<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orbital Explorer</title>

  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>

  <style>
    /* Make the globe fill the entire browser window */
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #64b5f6;
      padding: 24px 36px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 999;
    }

    /* Bottom Left */
    #stats {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.75);
      color: #aabbcc;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 999;
      display: none;
    }
    #stats span {
      color: #64b5f6;
      font-weight: bold;
    }
     /* Search box top Left */
    #searchBox {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 999;
      display: none;
    }
    #searchInput {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(100, 180, 255, 0.3);
      color: #ffffff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 260px;
      outline: none;
    }
    #searchInput::placeholder {
      color: #667788;
    }
    #searchInput:focus {
      border-color: #64b5f6;
    }
    #searchResults {
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 8px;
      margin-top: 4px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .search-result {
      padding: 6px 14px;
      color: #aabbcc;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .search-result:hover {
      background: rgba(100, 180, 255, 0.1);
      color: #ffffff;
    }
    .search-result .orbit-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    /* Info panel (right side, hidden by default) */
    #infoPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 320px;
      background: rgba(10, 12, 20, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 12px;
      color: #e0e8f0;
      padding: 20px;
      z-index: 999;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    #infoPanel h3 {
      color: #64b5f6;
      margin: 0 0 6px 0;
      font-size: 15px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .info-label { color: #8899aa; }
    .info-value { color: #ffffff; font-weight: 500; }
    .orbit-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
    }
    #closePanel {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #667;
      font-size: 18px;
      cursor: pointer;
    }
    #closePanel:hover { color: #aaa; }

  </style>
</head>
<body>

  <!-- This empty div is where Cesium draws the 3D globe -->
  <div id="cesiumContainer"></div>

  
  <div id="loading">Loading satellite data...</div>

  <!-- Search / filter box -->
  <div id="searchBox">
    <input type="text" id="searchInput" placeholder="Search satellites... (try 'rocket lab')">
    <div id="searchResults"></div>
  </div>

  <!-- satellite stats--> 
  <div id="stats" style="display: none;"></div>

   <!-- Detail panel for clicked satellite -->
  <div id="infoPanel">
    <button id="closePanel">&times;</button>
    <div id="infoPanelContent"></div>
  </div>

  <!--
  Our Code Loaded in order moving java to satellites.js and app.js for organization
  satellite.js must load first because it uses it's functions.
  
  -->
   <script src="js/satellites.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
