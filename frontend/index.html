<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orbital Explorer</title>

  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>

  <style>
    /* Make the globe fill the entire browser window */
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: #64b5f6;
      padding: 24px 36px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 999;
    }

    /* Stats Bar Bottom Left */
    #stats {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.75);
      color: #aabbcc;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 999;
      display: none;
    }
    #stats span {
      color: #64b5f6;
      font-weight: bold;
    }

    /* Filter Bar for Rocket Lab Explicitly */
    #controlPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 999;
      display: none;
      max-width: 360px;
    }

    #searchInput {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(100, 180, 255, 0.3);
      color: #ffffff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      outline: none;
      box-sizing: border-box;
    }
    #searchInput::placeholder { color: #667788; }
    #searchInput:focus { border-color: #64b5f6; }


    #searchResults {
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 8px;
      margin-top: 4px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .search-result {
      padding: 6px 14px;
      color: #aabbcc;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .search-result:hover {
      background: rgba(100, 180, 255, 0.1);
      color: #ffffff;
    }
    .search-result .orbit-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    /* Filter buttons row */
    #filterBar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }
    .filter-btn {
      border: 1px solid rgba(100, 180, 255, 0.3);
      background: rgba(30, 40, 60, 0.6);
      color: #a0b8d0;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      background: rgba(60, 80, 120, 0.6);
    }
    .filter-btn.active {
      background: rgba(100, 180, 255, 0.2);
      border-color: #64b5f6;
      color: #ffffff;
    }


    /* Info panel (right side, hidden by default) */
    #infoPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 320px;
      background: rgba(10, 12, 20, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 12px;
      color: #e0e8f0;
      padding: 20px;
      z-index: 999;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    #infoPanel h3 {
      color: #64b5f6;
      margin: 0 0 6px 0;
      font-size: 15px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .info-label { color: #8899aa; }
    .info-value { color: #ffffff; font-weight: 500; }
    .orbit-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
    }
    #closePanel {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #667;
      font-size: 18px;
      cursor: pointer;
    }
    #closePanel:hover { color: #aaa; }

    /* ---- NEW: Legend (bottom-right) ---- */
    #legend {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.75);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 11px;
      color: #8899aa;
      z-index: 999;
      display: none;
    }
    #stats, #legend {
      background: rgba(20, 25, 40, 0.65);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 180, 255, 0.18);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 3px 0;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

  </style>
</head>
<body>

  <!-- This empty div is where Cesium draws the 3D globe -->
  <div id="cesiumContainer"></div>
  <div id="loading">Loading satellite data...</div>

  <!-- Control Panel: Search / filter box -->
<div id="controlPanel">
    <input type="text" id="searchInput" placeholder="Search satellites... (try 'starlink' or 'ISS')">
    <div id="searchResults"></div>
    
    <div id="filterBar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="LEO" style="border-color: rgba(255,107,107,0.5);">LEO</button>
      <button class="filter-btn" data-filter="MEO" style="border-color: rgba(255,217,61,0.5);">MEO</button>
      <button class="filter-btn" data-filter="GEO" style="border-color: rgba(107,203,255,0.5);">GEO</button>
      <button class="filter-btn" data-filter="HEO" style="border-color: rgba(192,132,252,0.5);">HEO</button>
      <button class="filter-btn" data-filter="rocketlab" style="border-color: rgba(0,220,130,0.5);">Rocket Lab</button>
    </div>

    <div style="margin-top: 10px; border-top: 1px solid rgba(100,180,255,0.2); padding-top: 10px; display: flex; gap: 4px; flex-wrap: wrap;">
        <button id="isolationToggleBtn" class="filter-btn" style="border-color: #ff3333; font-weight: bold;">[ ] ISOLATION OVERRIDE</button>
        <button id="godsEyeToggleBtn" class="filter-btn" style="border-color: #00ff96; font-weight: bold;">[ ] GOD'S EYE HUD</button>
        
        <button id="regionalTargetBtn" class="filter-btn" style="border-color: #ffcc00;">Target Region (Map Click)</button>
        <button id="groundPOVBtn" class="filter-btn" style="border-color: rgba(100,255,200,0.5);">Ground POV</button>
        <button id="beamToggle" class="filter-btn" style="border-color: rgba(255,255,100,0.5); display:none;">Show Beams</button>
    </div>
  </div>

  <div id="godsEyeHud" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 500; box-shadow: inset 0 0 150px rgba(0, 255, 150, 0.15);">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; border: 1px solid rgba(0, 255, 150, 0.25); border-radius: 50%;"></div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 1px; background: rgba(0, 255, 150, 0.8);"></div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1px; height: 50px; background: rgba(0, 255, 150, 0.8);"></div>
    <div style="position: absolute; top: 30px; left: 30px; color: #00ff96; font-family: monospace; font-size: 13px; text-shadow: 0 0 6px #00ff96; line-height: 1.5;">
        <span style="background: #00ff96; color: #000; padding: 2px 6px; font-weight: bold;">OP: EPIC FURY</span><br><br>
        SYS.TRACKING // ACTIVE<br>
        LAT: <span id="hudLat">--</span><br>
        LON: <span id="hudLon">--</span><br>
        ALT: <span id="hudAlt">--</span><br>
        TGT: AIRSPACE LOCK
    </div>
    <div style="position: absolute; bottom: 30px; left: 30px; width: 400px; height: 160px; overflow-y: hidden; display: flex; flex-direction: column; justify-content: flex-end; color: #00ff96; font-family: monospace; font-size: 12px; text-shadow: 0 0 4px #00ff96; line-height: 1.5; border-left: 2px solid rgba(0, 255, 150, 0.5); padding-left: 12px; background: linear-gradient(90deg, rgba(0, 255, 150, 0.05) 0%, transparent 100%);">
        <div id="tacticalEventLog" style="display: flex; flex-direction: column; gap: 4px;">
            <div style="opacity: 0.5;">[SYS] INITIALIZING EVENT LOG...</div>
        </div>
    </div>
    <div style="position: absolute; top:0; left:0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 3px, 3px 100%; pointer-events: none; mix-blend-mode: overlay;"></div>
  </div>

  <div id="stats"></div>

  <!-- Detail panel for clicked satellite -->
  <div id="infoPanel">
    <button id="closePanel">&times;</button>
    <div id="infoPanelContent"></div>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div> LEO (&lt; 2,000 km)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffd93d"></div> MEO (2,000–35,000 km)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6bcbff"></div> GEO (~35,786 km)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div> HEO (&gt; 36,000 km)</div>
  </div>

  <!--
  Our Code Loaded in order moving java to satellites.js and app.js for organization
  satellite.js must load first because it uses it's functions.
  
  -->
  <script src="js/satellites.js"></script>
  <script src="js/beams.js"></script>
  <script src="js/app.js"></script>
  <script src="js/airplanes.js"></script>

</body>
</html>
